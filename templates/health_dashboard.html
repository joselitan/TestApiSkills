<!DOCTYPE html>
<html>
<head>
    <title>QA Platform Health Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .status-healthy { color: green; }
        .status-degraded { color: orange; }
        .status-unhealthy { color: red; }
        .metric { margin: 10px 0; padding: 10px; border: 1px solid #ddd; }
        .refresh-btn { padding: 10px 20px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>QA Platform Health Dashboard</h1>
    <button class="refresh-btn" onclick="refreshHealth()">Uppdatera Status</button>
    
    <div id="health-status">
        <p>Laddar hälsostatus...</p>
    </div>

    <script>
        async function refreshHealth() {
            try {
                const response = await fetch('/health/detailed');
                const data = await response.json();
                
                const statusClass = `status-${data.status}`;
                
                document.getElementById('health-status').innerHTML = `
                    <div class="metric">
                        <h2 class="${statusClass}">Status: ${data.status.toUpperCase()}</h2>
                        <p><strong>Uptime:</strong> ${data.uptime}</p>
                        <p><strong>Version:</strong> ${data.version}</p>
                        <p><strong>Environment:</strong> ${data.environment}</p>
                    </div>
                    
                    <div class="metric">
                        <h3>System Resources</h3>
                        <p><strong>CPU:</strong> ${data.system.cpu_usage}</p>
                        <p><strong>Memory:</strong> ${data.system.memory_usage}</p>
                        <p><strong>Disk:</strong> ${data.system.disk_usage}</p>
                    </div>
                    
                    <div class="metric">
                        <h3>Database</h3>
                        <p><strong>Status:</strong> ${data.database.status}</p>
                        <p><strong>Total entries:</strong> ${data.database.total_entries}</p>
                    </div>
                    
                    <div class="metric">
                        <h3>API Endpoints</h3>
                        ${Object.entries(data.api_endpoints).map(([endpoint, status]) => 
                            `<p><strong>${endpoint}:</strong> ${status.status} (${status.response_code})</p>`
                        ).join('')}
                    </div>
                `;
            } catch (error) {
                document.getElementById('health-status').innerHTML = 
                    `<p class="status-unhealthy">Fel vid hämtning av hälsostatus: ${error.message}</p>`;
            }
        }
        
        // Uppdatera var 30:e sekund
        setInterval(refreshHealth, 30000);
        refreshHealth();
    </script>
</body>
</html>
