<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guest Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Guest Book</h1>
        <button onclick="logout()" class="logout-btn">Logout</button>
        
        <div class="form-section">
            <h2>Add New Entry</h2>
            <form id="entryForm">
                <input type="text" id="name" placeholder="Name" required>
                <input type="email" id="email" placeholder="Email" required>
                <textarea id="comment" placeholder="Comment" rows="3"></textarea>
                <button type="submit">Add Entry</button>
            </form>
        </div>

        <div class="import-section">
            <h2>Import from Excel</h2>
            <input type="file" id="excelFile" accept=".xlsx,.xls">
            <button onclick="importExcel()">Upload Excel</button>
        </div>

        <div class="search-section">
            <h2>Search Entries</h2>
            <input type="text" id="searchInput" placeholder="Search by name, email, or comment...">
            <button onclick="searchEntries()">Search</button>
            <button onclick="clearSearch()">Clear</button>
        </div>

        <div class="entries-section">
            <h2>Guest Book Entries</h2>
            <table id="entriesTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Comment</th>
                        <th>Created</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="entriesBody"></tbody>
            </table>
            <div id="pagination">
                <button onclick="prevPage()">Previous</button>
                <span id="pageInfo"></span>
                <button onclick="nextPage()">Next</button>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Edit Entry</h3>
                <span class="close" onclick="closeEditModal()">&times;</span>
            </div>
            <form id="editForm">
                <input type="hidden" id="editId">
                <input type="text" id="editName" placeholder="Name" required>
                <input type="email" id="editEmail" placeholder="Email" required>
                <textarea id="editComment" placeholder="Comment" rows="3"></textarea>
                <div class="modal-buttons">
                    <button type="button" onclick="closeEditModal()">Cancel</button>
                    <button type="submit">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Delete Entry</h3>
                <span class="close" onclick="closeDeleteModal()">&times;</span>
            </div>
            <div class="modal-body">
                <p>Are you sure you want to delete this entry?</p>
                <div class="entry-preview">
                    <strong>Name:</strong> <span id="deleteEntryName"></span><br>
                    <strong>Email:</strong> <span id="deleteEntryEmail"></span><br>
                    <strong>Comment:</strong> <span id="deleteEntryComment"></span>
                </div>
                <p class="warning-text">This action cannot be undone.</p>
            </div>
            <div class="modal-buttons">
                <button type="button" onclick="closeDeleteModal()">Cancel</button>
                <button type="button" class="delete-confirm-btn" onclick="confirmDelete()">Delete Entry</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/guestbook.js') }}"></script>
</body>
</html>
