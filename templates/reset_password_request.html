<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Guest Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <button id="darkModeToggle" class="dark-mode-toggle" aria-label="Switch to dark mode">🌙</button>
    <div class="auth-container">
        <h1>Forgot Password</h1>
        <form id="resetRequestForm">
            <input type="email" id="email" placeholder="Registered email" required>
            <button type="submit">Send reset link</button>
            <div id="error" class="error"></div>
            <div id="success" class="success"></div>
        </form>
        <p class="hint"><a href="/login">Back to login</a></p>
    </div>

    <script src="{{ url_for('static', filename='js/darkmode.js') }}"></script>
    <script src="{{ url_for('static', filename='js/reset_password_request.js') }}"></script>
</body>
</html>
