<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Guest Book</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script>(function(){if(localStorage.getItem('darkMode')==='enabled'){document.documentElement.classList.add('dark-mode');}})();</script>
</head>
<body>
    <button id="darkModeToggle" class="dark-mode-toggle" aria-label="Switch to dark mode">🌙</button>
    <div class="login-container">
        <h1>Guest Book Login</h1>
        <form id="loginForm">
            <input type="text" id="identifier" placeholder="Email or Username">
            <input type="password" id="password" placeholder="Password">
            <button type="submit">Login</button>
            <div id="error" class="error"></div>
        </form>
        <p class="hint">Default login: admin / password123</p>
        <div class="auth-links">
            <a href="/register">Create account</a> |
            <a href="/reset-password-request">Forgot password?</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/darkmode.js') }}"></script>
    <script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
