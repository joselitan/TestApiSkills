name: Run Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install Playwright Browsers
      run: playwright install --with-deps

    - name: Create data directory
      run: mkdir -p data

    - name: Initialize database
      run: python -c "from src.database import init_db; init_db()"

    - name: Start Flask app in background
      run: |
        python src/app.py &
        sleep 5

    - name: Run security tests
      run: | 
        pytest tests/security -s -v
        python scripts/security/security_scan.py   

    - name: Check Security Results
      run: |
        if [ -f "reports/security_summary.json" ]; then
          python3 << 'EOF'
        import json
        import sys
        try:
            with open('reports/security_summary.json', 'r') as f:
                summary = json.load(f)
            # Check for high severity Bandit issues
            if summary.get('bandit', {}).get('high_severity_count', 0) > 0:
                print('SECURITY GATE FAILED: High severity security issues found!')
                sys.exit(1)
            # Check for critical Safety vulnerabilities
            if summary.get('safety', {}).get('vulnerabilities_found', 0) > 0:
                print('SECURITY GATE FAILED: Critical vulnerabilities in dependencies!')
                sys.exit(1)
            print('Security gate passed - no critical issues found')
        except Exception as e:
            print(f'Could not validate security results: {e}')
            # Don't fail build if we can't read results
        EOF
        else
          echo "No security summary found, skipping security gate check"
        fi

    - name: Upload Security Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-reports
        path: |
          reports/
          *.json
          *.html

    - name: Run api tests
      run: | 
        pytest tests/api -s -v
    
    - name: Run ui tests
      run: | 
        pytest tests/ui -s -v

    - name: Run performance tests
      run: |
        pytest tests/performance/test_load_testing.py -s -v
    #    pytest tests/performance/test_load_testing.py -s -v
    #    pytest tests/performance/test_stress_testing.py -s -v
    #    pytest tests/performance/test_volume_testing.py -s -v
    #    pytest tests/performance/test_spike_testing.py -s -v
    #    pytest tests/performance/test_endurance_testing.py -s -v

    - name: Run performance monitoring
      run: |
        python scripts/performance/performance_monitor.py --duration 30 --users 3 --requests 5 --url http://localhost:8080

    - name: Upload Performance Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: performance-reports
        path: |
          reports/performance/
          *.json